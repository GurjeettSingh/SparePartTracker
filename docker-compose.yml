services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: spareparts
      POSTGRES_PASSWORD: spareparts
      POSTGRES_DB: spareparts
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    depends_on:
      - db
    ports:
      - "8001:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    env_file:
      - ./.env
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8001}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0 -p 3000"
    ports:
      - "3001:3000"
    depends_on:
      - backend

volumes:
  db_data:
  frontend_node_modules:
